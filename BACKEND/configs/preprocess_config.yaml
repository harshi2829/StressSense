# WESAD Preprocessing Configuration
# ==================================
# Configuration file for data_preprocess.py
#
# Usage:
#   python data_preprocess.py --config configs/preprocess_config.yaml

# Data paths
input: "data_raw/"
output: "data_processed/"

# Subject selection (null = all subjects)
# Available subjects in WESAD: S2, S3, S4, S5, S6, S7, S8, S9, S10, S11, S13, S14, S15, S16, S17
subjects: null

# Windowing parameters
window_size: 10.0  # Window duration in seconds
overlap: 0.0       # Overlap fraction (0.0 = no overlap, 0.5 = 50% overlap)

# Signal processing parameters
sampling_rate: 32  # Target sampling rate in Hz (after resampling)

# Filtering parameters
filtering:
  ecg:
    type: "bandpass"
    lowcut: 0.5    # Low cutoff frequency (Hz)
    highcut: 40.0  # High cutoff frequency (Hz)
    order: 4       # Filter order
    
  eda:
    type: "lowpass"
    cutoff: 5.0    # Cutoff frequency (Hz)
    order: 4       # Filter order
    
  temp:
    type: "smooth"
    window_size: 5  # Moving average window size (samples)
    
  acc:
    type: "smooth"
    window_size: 5  # Moving average window size (samples)

# Normalization
normalize: "zscore"  # Options: zscore, minmax, none

# Binary classification (stress vs non-stress)
binary: true

# Label mapping for binary classification
# WESAD original labels:
#   0: Not defined (excluded)
#   1: Baseline -> Non-Stress (0)
#   2: Stress -> Stress (1)
#   3: Amusement -> Non-Stress (0)
#   4: Meditation -> Non-Stress (0)
#   5-7: Other (excluded)

# Signals to extract (chest sensor)
signals:
  - ECG   # Electrocardiogram (700 Hz)
  - EDA   # Electrodermal Activity (4 Hz)
  - TEMP  # Temperature (4 Hz)
  - ACC   # Accelerometer (32 Hz) - uses magnitude

# Quality control
quality:
  min_label_consistency: 0.8  # Minimum fraction of consistent labels in window

# Logging
verbose: true
